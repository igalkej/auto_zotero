# ─────────────────────────────────────────────────────────────
# config/feeds.yaml — RSS feeds consumed by S2.
#
# All feeds start with `active: false` so the worker doesn't hit any
# external service until the user has reviewed the list. Flip individual
# feeds to `active: true` (or edit them via `/config/feeds` in the
# dashboard once Phase 12 lands) before the first fetch cycle.
# See docs/plan_02_subsystem2.md §6 for the schema.
# ─────────────────────────────────────────────────────────────
feeds:
  - id: aer
    name: "American Economic Review"
    rss_url: "https://www.aeaweb.org/journals/aer/rss"
    issn: "0002-8282"
    active: false

  - id: jep
    name: "Journal of Economic Perspectives"
    rss_url: "https://www.aeaweb.org/journals/jep/rss"
    issn: "0895-3309"
    active: false

  - id: qje
