# ─────────────────────────────────────────────────────────────
# config/scoring.yaml — default weights for the S2 composite score.
# Defaults match docs/plan_02_subsystem2.md §7.4.
# Adjust via the dashboard at /config/weights once Phase 12 lands.
# ─────────────────────────────────────────────────────────────
version: 1

weights:
  tags: 1.0
  semantic: 2.0
  queries: 2.0

tag_scoring:
  # Whether to use the LLM-based tag extractor (better) or plain keyword
  # matching (cheaper). The keyword fallback is useful when the OpenAI
  # budget is tight; see plan_02 §7.1 alternative.
  mode: llm   # llm | keywords
  top_k_user_tags: 30

semantic_scoring:
  top_k_corpus: 20
  # Returned when ChromaDB has fewer than min_corpus_size documents, so
  # the composite stays defined instead of silently dropping to 0 (see
  # plan_02 §7.2).
  neutral_fallback: 0.5
  # Minimum docs in ChromaDB below which we fall back to neutral_fallback
  # without attempting the k-NN query. Threshold-by-count (rather than
  # "empty / not empty") covers small libraries where k-NN over a handful
  # of papers would be uninformative noise. See ADR 015 §2.
  min_corpus_size: 50

query_scoring:
  # Convex hybrid of BM25 (lexical) and dense cosine: α·BM25 + (1-α)·cos.
  # Default 0.4 per literature standard for short queries (Pyserini /
  # Elastic / LangChain). Overridable at runtime via S2_QUERY_BM25_WEIGHT.
  # See ADR 017 for rationale and why pure dense underperforms on
  # ≤5-token queries.
  bm25_weight: 0.4
